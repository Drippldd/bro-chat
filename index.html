<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>БРО — Мессенджер</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div id="auth-screen" class="modal">
        <div class="auth-card">
            <h2 id="auth-title">Вход в БРО</h2>
            
            <div id="step-phone">
                <input type="tel" id="reg-phone" placeholder="+7 или +375...">
                <button onclick="handlePhoneSubmit()">ДАЛЕЕ</button>
            </div>

            <div id="step-pass" class="hidden">
                <input type="password" id="reg-pass" placeholder="Придумай пароль">
                <button onclick="handlePassSubmit()">ВОЙТИ</button>
            </div>

            <div id="step-code" class="hidden">
                <p style="font-size: 12px; margin-bottom: 10px;">Код отправлен на номер</p>
                <input type="text" id="reg-code" placeholder="0000">
                <button onclick="verifyCode()">ПОДТВЕРДИТЬ</button>
            </div>
        </div>
    </div>

    <div class="main-wrapper hidden" id="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="profile-header">
                <div class="avatar" id="user-avatar" onclick="document.getElementById('avatar-upload').click()">👤</div>
                <input type="file" id="avatar-upload" hidden accept="image/*" onchange="changeAvatar(event)">
                <div class="user-info">
                    <b id="user-name-display">Бро</b>
                    <p id="user-status-display">На связи</p>
                </div>
            </div>
            <nav class="side-menu">
                <ul>
                    <li onclick="showTab('chats')" id="li-chats" class="active-li">💬 Чаты</li>
                    <li onclick="showTab('music-tab')" id="li-music-tab">🎵 Музыка</li>
                    <li onclick="showTab('feed')" id="li-feed">🚀 Лента</li>
                </ul>
            </nav>
        </aside>

        <div class="app-container">
            <header>
                <button class="burger" onclick="toggleSidebar()">☰</button>
                <h1 id="current-page-title">Чаты</h1>
            </header>

            <main id="content-area">
                <div id="chats-window" class="tab-content">
                    <div class="search-box">
                        <input type="text" id="user-search" placeholder="Найти Бро..." oninput="filterUsers()">
                    </div>
                    <div class="section-title">ЛЮДИ В СЕТИ</div>
                    <div id="users-list"></div>
                </div>

                <div id="private-chat-window" class="tab-content hidden">
                    <div class="chat-header-top">
                        <button onclick="showTab('chats')" class="back-btn">⬅</button>
                        <span id="chat-with-name">Чат</span>
                    </div>
                    <div id="chat-messages" class="messages-container"></div>
                    <div class="controls">
                        <div class="input-area">
                            <label for="chat-media" class="attach-btn">📎</label>
                            <input type="file" id="chat-media" hidden accept="image/*">
                            <input type="text" id="msg-input" placeholder="Сообщение...">
                            <button id="send-btn" class="send-btn">🚀</button>
                        </div>
                    </div>
                </div>

                <div id="music-tab-window" class="tab-content hidden">
                    <div class="music-box">
                        <input type="text" id="sc-link" placeholder="Вставь ссылку на SoundCloud">
                        <button onclick="playMusic()">ИГРАТЬ</button>
                        <div id="player-frame"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
