<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>БРО — Соцсеть</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <!-- ЭКРАН ВХОДА С ПОЛНОЙ РЕГИСТРАЦИЕЙ -->
    <div id="auth-screen" class="modal">
        <div class="auth-card">
            <h2 id="auth-title">Вход в БРО</h2>
            
            <div id="step-phone">
                <input type="tel" id="reg-phone" placeholder="+7 или +375...">
                <button onclick="handlePhoneSubmit()">ДАЛЕЕ</button>
            </div>

            <div id="step-pass" class="hidden">
                <input type="password" id="reg-pass" placeholder="Пароль">
                <button onclick="handlePassSubmit()">ДАЛЕЕ</button>
            </div>

            <div id="step-code" class="hidden">
                <p style="font-size: 12px; margin-bottom: 10px;">Код: 1111</p>
                <input type="text" id="reg-code" placeholder="0000">
                <button onclick="verifyCode()">ПОДТВЕРДИТЬ</button>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ (БЕЗ ИЗМЕНЕНИЙ) -->
    <div class="main-wrapper hidden" id="app-shell">
        <aside class="sidebar">
            <div class="profile-header">
                <div class="avatar" id="user-avatar" onclick="document.getElementById('avatar-upload').click()">👤</div>
                <input type="file" id="avatar-upload" hidden onchange="changeAvatar(event)">
                <div class="user-info">
                    <b id="user-name-display">Бро</b>
                    <p id="user-status-display">На связи</p>
                    <button class="edit-btn" onclick="openEditProfile()">📝 Редакт.</button>
                </div>
            </div>
            <nav class="side-menu">
                <ul>
                    <li onclick="showTab('chats-window')" id="li-chats" class="active-li">💬 Чаты</li>
                    <li onclick="showTab('feed-window')" id="li-feed">🚀 Лента</li>
                    <li onclick="showTab('wall-window')" id="li-wall">🖼️ Моя Стена</li>
                    <li onclick="showTab('reposts-window')" id="li-reposts">🔄 Репосты</li>
                    <li onclick="showTab('music-window')" id="li-music">🎵 Музыка</li>
                </ul>
            </nav>
            <button class="kfc-btn" onclick="orderKFC()">🍗 KFC / Rostic's</button>
        </aside>

        <div class="app-container">
            <header><h1 id="page-title">Чаты</h1></header>
            <main id="content-area">
                <div id="chats-window" class="tab-content">
                    <div id="users-list"></div>
                </div>

                <div id="chat-window" class="tab-content hidden">
                    <div class="chat-header">
                        <button onclick="showTab('chats-window')" class="back-btn">←</button>
                        <span id="chat-name">Чат</span>
                        <div class="chat-buttons">
                            <button class="joint-btn" id="joint-btn" onclick="toggleSync()">🤝 СИНХРОН</button>
                            <button class="debt-btn" onclick="openDebt()">💸 КИДАЛОВО</button>
                        </div>
                    </div>
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="chat-input">
                        <label class="attach-btn" for="chat-file">📎</label>
                        <input type="file" id="chat-file" hidden onchange="sendChatMedia(event)">
                        <input type="text" id="msg-input" placeholder="Сообщение...">
                        <button onclick="sendMessage()" class="send-btn">🚀</button>
                    </div>
                </div>

                <div id="feed-window" class="tab-content hidden">
                    <div id="feed-posts"></div>
                </div>

                <div id="wall-window" class="tab-content hidden">
                    <div class="post-input">
                        <textarea id="post-text" placeholder="Что нового, Бро?..."></textarea>
                        <div class="post-actions-bar">
                            <label class="media-label">📎 Фото/Видео <input type="file" id="post-media" hidden onchange="previewMedia()"></label>
                            <button onclick="createPost()" class="post-btn">ОПУБЛИКОВАТЬ</button>
                        </div>
                    </div>
                    <div id="wall-posts"></div>
                </div>

                <div id="reposts-window" class="tab-content hidden">
                    <div id="reposts-list"></div>
                </div>

                <div id="music-window" class="tab-content hidden">
                    <div class="music-box">
                        <h2>SOUNDCLOUD</h2>
                        <input type="text" id="music-link" placeholder="Вставь ссылку">
                        <button onclick="playMusic()">ИГРАТЬ</button>
                        <div id="music-player"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
